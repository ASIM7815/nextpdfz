[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  PYTHON_VERSION = "3.11"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect www to non-www
[[redirects]]
  from = "https://www.pdfz.asimsaad.com/*"
  to = "https://pdfz.asimsaad.com/:splat"
  status = 301
  force = true

# Python API endpoints
[[redirects]]
  from = "/api/protect-pdf"
  to = "/.netlify/functions/protect-pdf"
  status = 200

[[redirects]]
  from = "/api/unlock-pdf"
  to = "/.netlify/functions/unlock-pdf"
  status = 200

[[redirects]]
  from = "/api/merge-pdf"
  to = "/.netlify/functions/merge-pdf"
  status = 200

[[redirects]]
  from = "/api/split-pdf"
  to = "/.netlify/functions/split-pdf"
  status = 200

[[redirects]]
  from = "/api/compress-pdf"
  to = "/.netlify/functions/compress-pdf"
  status = 200

[[redirects]]
  from = "/api/rotate-pdf"
  to = "/.netlify/functions/rotate-pdf"
  status = 200

[[redirects]]
  from = "/api/pdf-to-word"
  to = "/.netlify/functions/pdf-to-word"
  status = 200

[[redirects]]
  from = "/api/word-to-pdf"
  to = "/.netlify/functions/word-to-pdf"
  status = 200

[[redirects]]
  from = "/api/pdf-to-excel"
  to = "/.netlify/functions/pdf-to-excel"
  status = 200

[[redirects]]
  from = "/api/excel-to-pdf"
  to = "/.netlify/functions/excel-to-pdf"
  status = 200

[[redirects]]
  from = "/api/pdf-to-powerpoint"
  to = "/.netlify/functions/pdf-to-powerpoint"
  status = 200

[[redirects]]
  from = "/api/powerpoint-to-pdf"
  to = "/.netlify/functions/powerpoint-to-pdf"
  status = 200

[[redirects]]
  from = "/api/pdf-to-jpg"
  to = "/.netlify/functions/pdf-to-jpg"
  status = 200

[[redirects]]
  from = "/api/jpg-to-pdf"
  to = "/.netlify/functions/jpg-to-pdf"
  status = 200

# Cache static assets
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
